name: Build Android APK (Zırhlı Versiyon)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manuel olarak da başlatabilmen için

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Setup Java (OpenJDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libgstreamer-plugins-base1.0-dev \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          libffi-dev \
          libssl-dev \
          cmake \
          openjdk-17-jdk

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade "cython<3.0" # Kivy için kritik versiyon
        pip install buildozer

    - name: Cache Buildozer Data
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Build APK (Zırhlı Mod)
      run: |
        # SDK lisanslarını otomatik onaylamanın en pro yolu budur:
        export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
        yes | buildozer -v android debug
      env:
        # Buildozer'ın hata almasını önleyen env flag'leri
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: turkey_earthquake_app
        path: bin/*.apk
        retention-days: 5
