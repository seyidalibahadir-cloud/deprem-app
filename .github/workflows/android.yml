name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
          build-essential libffi-dev libssl-dev \
          libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev \
          zlib1g-dev libncurses5-dev libncursesw5-dev

    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython kivy kivymd requests

    - name: Init Buildozer (if needed)
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    - name: Fix Android SDK + Accept licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg || true

        # Buildozer Android setup
        buildozer android update || true

        # Accept SDK licenses (fix for build-tools errors)
        SDKMANAGER=$(find ~/.buildozer -name sdkmanager 2>/dev/null | head -n 1)

        if [ ! -z "$SDKMANAGER" ]; then
          yes | "$SDKMANAGER" --licenses || true
        fi

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deprem-app-apk
        path: bin/*.apk
