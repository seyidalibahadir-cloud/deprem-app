name: Build Android APK (Ultra-Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # GitHub Actions Node.js uyarılarını susturur ve modernize eder
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Setup Java (OpenJDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --fix-broken
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libgstreamer-plugins-base1.0-dev \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          libncurses5-dev \
          libncursesw5-dev \
          libffi-dev \
          libssl-dev \
          libsqlite3-dev \
          libbz2-dev \
          libreadline-dev \
          liblzma-dev \
          cmake \
          openjdk-17-jdk \
          libunwind-dev

    - name: Install Python Tools (The Fixer)
      run: |
        python -m pip install --upgrade pip
        # KRİTİK: Setuptools 70+ sürümleri Buildozer'ı bozabiliyor, 66.1.1 en stabilidir.
        # Cython 3.0+ Kivy ile bazen çatışır, <3.0 zorunludur.
        pip install "setuptools<70.0.0" "cython<3.0" wheel
        pip install buildozer

    - name: Cache Buildozer Data
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

    - name: Build APK
      run: |
        # SDK Lisanslarını onaylamak için en güvenli yöntem
        export APP_ANDROID_ACCEPT_SDK_LICENSE="1"
        # Buildozer'ın ağ hatalarına karşı daha dirençli olması için
        buildozer -v android debug
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.incremental=false"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: deprem-app-debug
        path: bin/*.apk
        retention-days: 3
