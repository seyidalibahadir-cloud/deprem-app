name: Build Android APK (Final-Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake build-essential ccache cmake git \
            libffi-dev libssl-dev libtool pkg-config python3-dev \
            unzip wget zip zlib1g-dev

      - name: Install Build Tools (Kivy 2.3.0 Compatible)
        run: |
          python -m pip install --upgrade pip
          # Kivy 2.3.0 için Cython 3.0.0+ şarttır
          pip install "cython>=3.0.0" "buildozer==1.5.0" "virtualenv" "setuptools"

      - name: Pre-Setup Android SDK & Licenses
        run: |
          # Buildozer'ın aradığı 'cmdline-tools/latest' yapısını kuruyoruz
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools latest
          
          # Yolları tanımla ve lisansları onayla
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME

      - name: Build APK
        env:
          # Ortam değişkenlerini Buildozer'a geçiriyoruz
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          PATH: /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          # 'yes' ile her ihtimale karşı tüm interaktif soruları geçiyoruz
          yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Deprem-App-Debug
          path: bin/*.apk
          retention-days: 7
