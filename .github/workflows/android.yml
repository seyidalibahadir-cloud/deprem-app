name: Build Android APK (Ultra-Stable Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  JAVA_VERSION: "17"
  CACHE_VERSION: "v2"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    # ✅ Sistem bağımlılıkları
    - name: Install System Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential ccache git zip unzip \
          libffi-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev \
          libreadline-dev libsqlite3-dev libbz2-dev \
          liblzma-dev libgdbm-dev libnss3-dev \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          autoconf automake libtool pkg-config cmake

    # ✅ CACHE
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}

    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ env.CACHE_VERSION }}

    # ✅ Python tools
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install \
          "setuptools==69.5.1" \
          "cython==0.29.37" \
          "buildozer==1.5.0" \
          "virtualenv"

    # 🔥 EN KRİTİK DÜZELTME (SDK + BUILD-TOOLS ZORLA KUR)
    - name: Install Android SDK Components
      run: |
        SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p $SDK_ROOT/cmdline-tools

        cd $SDK_ROOT

        echo "Downloading cmdline-tools..."
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv cmdline-tools latest
        rm commandlinetools-linux-*.zip

        export ANDROID_HOME=$SDK_ROOT
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses

        echo "Installing SDK packages..."
        sdkmanager \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

    # ✅ BUILD
    - name: Build APK
      run: |
        buildozer android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: y
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

    # ✅ APK yükle
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ github.run_number }}
        path: bin/*.apk
