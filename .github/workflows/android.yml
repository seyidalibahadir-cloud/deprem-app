name: Build Android APK (Ultra-Stable)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  JAVA_VERSION: "17"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            autoconf automake build-essential ccache cmake git \
            libbz2-dev libffi-dev libfreetype6-dev libgdbm-dev \
            libjpeg-dev liblzma-dev libncurses5-dev libncursesw5-dev \
            libopenjp2-7-dev libportmidi-dev libreadline-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libsqlite3-dev libssl-dev libunwind-dev \
            libtool pkg-config python3-dev unzip wget zip zlib1g-dev

      - name: Cache Buildozer ve Pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip --quiet
          pip install "setuptools" "cython==0.29.37" "wheel" "virtualenv" "buildozer" --quiet

      - name: Pre-accept Android SDK Licenses
        # Buildozer kendi SDK'sını indirirken lisansta takılmaması için
        # lisans dosyalarını Buildozer'ın arayacağı dizine önceden oluşturuyoruz.
        run: |
          SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          LICENSES_DIR="$SDK_ROOT/licenses"
          mkdir -p "$LICENSES_DIR"

          cat > "$LICENSES_DIR/android-sdk-license" <<'EOF'
          8933bad161af4178b1185d1a37fbf41ea5269c55
          d56f5187479451eabf01fb78af6dfcb131a6481e
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          EOF

          cat > "$LICENSES_DIR/android-sdk-preview-license" <<'EOF'
          84831b9409646a918e30573bab4c9c91346d8abd
          EOF

      - name: Build APK
        # 'yes' komutu, Buildozer'ın beklenmedik bir şekilde onay istemesi durumunda
        # GitHub Actions'ın sonsuza kadar asılı kalmasını (hang) engeller.
        run: yes | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: deprem-app-debug-${{ github.run_number }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Build Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-failure-logs-${{ github.run_number }}
          path: |
            .buildozer/android/platform/build-*/dists/*/build.log
            .buildozer/android/platform/build-*/build/outputs/logs/*.log
          if-no-files-found: warn
          retention-days: 14
