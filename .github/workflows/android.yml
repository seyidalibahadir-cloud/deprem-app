name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk \
          build-essential libffi-dev libssl-dev \
          libsqlite3-dev libbz2-dev libreadline-dev liblzma-dev \
          zlib1g-dev libncurses5-dev libncursesw5-dev
        pip install --upgrade pip
        pip install buildozer cython kivy kivymd requests

    - name: Initialize Buildozer
      run: |
        buildozer init || true
        buildozer android update

    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        SDKMANAGER=$(find ~/.buildozer/android/platform/android-sdk -name sdkmanager | head -n 1)
        if [ -z "$SDKMANAGER" ]; then
          echo "sdkmanager not found"
          exit 1
        fi
        yes | "$SDKMANAGER" --licenses

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
